<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Even Audio Pipe</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #202020;
        color: #ededed;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        box-sizing: border-box;
        min-height: 100%;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 650;
      }

      .panel {
        border: 1px solid #4a4a4a;
        border-radius: 8px;
        padding: 12px;
        background: #2c2c2c;
      }

      .label {
        color: #a7a7a7;
        font-size: 12px;
        margin-bottom: 4px;
      }

      #status,
      #stats,
      #url,
      #transcript {
        overflow-wrap: anywhere;
        line-height: 1.4;
      }

      #transcript {
        white-space: pre-wrap;
        min-height: 72px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Even Audio Pipe</h1>
      <section class="panel">
        <div class="label">Status</div>
        <div id="status">Starting...</div>
      </section>
      <section class="panel">
        <div class="label">Receiver</div>
        <div id="url"></div>
      </section>
      <section class="panel">
        <div class="label">Stream</div>
        <div id="stats">0 chunks, 0 bytes</div>
      </section>
      <section class="panel">
        <div class="label">Transcript</div>
        <div id="transcript">Listening...</div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

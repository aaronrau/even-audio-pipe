<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Agent Audio Pipe</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f3f0;
        --surface: #ffffff;
        --surface-soft: #f9f9f7;
        --line: #e2e2dd;
        --line-strong: #d5d5cf;
        --text: #161716;
        --muted: #777a75;
        --soft: #3a3c39;
        --accent: #8eb85d;
        --shadow: 0 10px 30px rgba(30, 32, 30, 0.08);
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Avenir Next",
          "SF Pro Display",
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      body::before {
        display: none;
      }

      main {
        box-sizing: border-box;
        min-height: 100%;
        width: min(560px, 100%);
        margin: 0 auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        position: relative;
      }

      .hero {
        padding: 8px 2px 4px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.04;
        font-weight: 650;
        letter-spacing: 0;
      }

      .kicker {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 560;
        letter-spacing: 0;
      }

      .subhead {
        margin: 9px 0 0;
        max-width: 420px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .signal {
        position: relative;
        width: 48px;
        height: 48px;
        border: 1px solid var(--line);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .signal::before,
      .signal::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        border: 1.4px solid var(--text);
        border-radius: 50%;
      }

      .signal::after {
        width: 30px;
        height: 30px;
        border-color: var(--line-strong);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .panel.primary {
        background: var(--surface);
        border-color: var(--line-strong);
      }

      .panel-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 560;
        letter-spacing: 0;
        margin-bottom: 8px;
      }

      .value {
        font-size: 15px;
        font-weight: 520;
      }

      #status,
      #stats,
      #url,
      #transcript {
        overflow-wrap: anywhere;
        line-height: 1.45;
      }

      #transcript {
        white-space: pre-wrap;
        min-height: 88px;
        color: var(--soft);
      }

      .endpoint-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .secret-row {
        display: grid;
        grid-template-columns: 1fr 44px;
        gap: 8px;
      }

      .address-grid,
      .address-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .address-row {
        grid-template-columns: minmax(0, 1fr) minmax(78px, 108px);
      }

      input,
      button {
        box-sizing: border-box;
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--text);
        font: inherit;
        padding: 12px;
        outline: none;
      }

      input::placeholder {
        color: #a0a29d;
      }

      input:focus {
        border-color: var(--text);
      }

      button {
        border-color: var(--text);
        background: var(--text);
        color: #ffffff;
        cursor: pointer;
        font-weight: 620;
        letter-spacing: 0;
      }

      button:active {
        transform: translateY(1px);
      }

      .icon-button {
        min-width: 0;
        height: 46px;
        padding: 0;
        display: grid;
        place-items: center;
        background: var(--surface-soft);
        color: var(--text);
        border-color: var(--line);
      }

      .eye-icon {
        position: relative;
        width: 20px;
        height: 12px;
        border: 1.7px solid currentColor;
        border-radius: 50%;
      }

      .eye-icon::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
        transform: translate(-50%, -50%);
      }

      @media (min-width: 680px) {
        main {
          padding: 28px 18px;
        }

        .panel-row {
          grid-template-columns: 1fr 1fr;
        }

        .endpoint-grid {
          grid-template-columns: 1fr auto;
          align-items: center;
        }

        .address-grid,
        .secret-row {
          grid-column: 1;
        }

        button {
          min-width: 148px;
        }

        .icon-button {
          min-width: 0;
        }

        #save-endpoints {
          grid-column: 2;
          grid-row: 1 / span 2;
          align-self: stretch;
        }
      }

      @media (max-width: 420px) {
        main {
          padding: 16px;
        }

        .hero {
          grid-template-columns: 1fr;
        }

        .signal {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="hero">
        <div>
          <p class="kicker">Local agent control</p>
          <h1>Agent Audio Pipe</h1>
          <p class="subhead">Live microphone relay, transcript routing, and named agent sessions for G-series glasses.</p>
        </div>
        <div class="signal" aria-hidden="true"></div>
      </header>
      <section class="panel primary">
        <div class="label">Status</div>
        <div id="status" class="value">Starting...</div>
      </section>
      <div class="panel-row">
        <section class="panel">
          <div class="label">Receiver</div>
          <div id="url" class="value"></div>
        </section>
        <section class="panel">
          <div class="label">Stream</div>
          <div id="stats" class="value">0 chunks, 0 bytes</div>
        </section>
      </div>
      <section class="panel">
        <div class="label">Connection</div>
        <div class="endpoint-grid">
          <div class="address-grid">
            <div class="address-row">
              <input
                id="private-ip"
                autocomplete="off"
                autocapitalize="none"
                inputmode="decimal"
                pattern="[0-9.]*"
                spellcheck="false"
                placeholder="Private IP"
              />
              <input
                id="private-port"
                autocomplete="off"
                inputmode="numeric"
                pattern="[0-9]*"
                spellcheck="false"
                placeholder="Port"
              />
            </div>
            <div class="address-row">
              <input
                id="public-ip"
                autocomplete="off"
                autocapitalize="none"
                inputmode="decimal"
                pattern="[0-9.]*"
                spellcheck="false"
                placeholder="Public IP"
              />
              <input
                id="public-port"
                autocomplete="off"
                inputmode="numeric"
                pattern="[0-9]*"
                spellcheck="false"
                placeholder="Port"
              />
            </div>
          </div>
          <div class="secret-row">
            <input
              id="auth-token"
              type="password"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              placeholder="Shared secret"
            />
            <button
              id="toggle-auth-token"
              class="icon-button"
              type="button"
              aria-label="Show secret"
              aria-pressed="false"
              title="Show secret"
            >
              <span class="eye-icon" aria-hidden="true"></span>
            </button>
          </div>
          <button id="save-endpoints" type="button">Save</button>
        </div>
      </section>
      <section class="panel">
        <div class="label">Transcript</div>
        <div id="transcript" class="value">Listening...</div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
